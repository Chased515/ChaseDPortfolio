  <script>
const c = document.getElementById('starCanvas'),
      x = c.getContext('2d'),
      m = {x:null,y:null},
      stars = Array.from({length:300},()=>({
        nx:Math.random(),
        ny:Math.random(),
        s:Math.random()*0+1,
        a:Math.random()*0.5+0.5
      }));

const resize = () => (c.width = innerWidth, c.height = innerHeight);
addEventListener('resize', resize); resize();

addEventListener('mousemove', e => (m.x = e.clientX, m.y = e.clientY));
addEventListener('mouseleave', () => (m.x = m.y = null));

const SHAKE = 1.5, R = 120;

(function draw(t){
  x.clearRect(0,0,c.width,c.height);
  t *= 0.005;

  stars.forEach(st => {
    let X = st.nx * c.width,
        Y = st.ny * c.height;

    if (m.x != null) {
      const dx = X - m.x, dy = Y - m.y,
            d = Math.hypot(dx,dy);
      if (d < R) {
        const f = (R - d) / R;
        X += Math.sin(t + st.nx*10) * SHAKE * f;
        Y += Math.cos(t + st.ny*10) * SHAKE * f;
      }
    }

    x.beginPath();
    x.arc(X, Y, st.s, 0, Math.PI*2);
    x.fillStyle = `rgba(120,180,255,${st.a})`;
    x.fill();
  });

  requestAnimationFrame(draw);
})();
</script>
